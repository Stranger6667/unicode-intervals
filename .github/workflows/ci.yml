name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  RUSTFLAGS: -Dwarnings
  CARGO_TERM_COLOR: always

jobs:

  test:
    name: Tests (${{ matrix.toolchain }} / ${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - toolchain: nightly
            target: x86_64-unknown-linux-gnu
          - toolchain: beta
            target: x86_64-unknown-linux-gnu
          - toolchain: stable
            target: x86_64-unknown-linux-gnu
          - toolchain: "1.85.0"
            target: x86_64-unknown-linux-gnu
            # The binding's pyo3 dep tree (icu_*, idna) needs rustc > 1.85; MSRV
            # gates the core crate only.
            exclude-py: --exclude unicode-intervals-py
          - toolchain: stable
            target: wasm32-wasip1
            # pyo3 test bin imports the CPython C-API (e.g. env::_Py_DecRef), which
            # wasmtime can't resolve; build/run only the core crate on wasm.
            exclude-py: --exclude unicode-intervals-py
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Wasmtime
        if: matrix.target == 'wasm32-wasip1'
        run: |
          cd /tmp
          wget https://github.com/bytecodealliance/wasmtime/releases/download/${{ env.VERSION }}/wasmtime-${{ env.VERSION }}-${{ env.ARCH }}.tar.xz
          tar xf wasmtime-${{ env.VERSION }}-${{ env.ARCH }}.tar.xz
          mv wasmtime-${{ env.VERSION }}-${{ env.ARCH }}/wasmtime /usr/local/bin/wasmtime
        env:
          VERSION: v28.0.0
          ARCH: x86_64-linux

      - run: cargo test --workspace ${{ matrix.exclude-py }} --no-fail-fast --target=${{ matrix.target }}

  test-coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate code coverage
        run: cargo llvm-cov --all-features --workspace --exclude unicode-intervals-py --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features

  fmt:
    name: Rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test-python:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', 'pypy3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ matrix.python-version }}
      - run: uvx --with=".[tests]" --python='${{ matrix.python-version }}' pytest tests-py
        working-directory: crates/unicode-intervals-py

  test-python-freethreaded:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
        python-version: ['3.13t', '3.14t']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v7
      - run: uv python install ${{ matrix.python-version }}

      - name: Find Python path (Windows)
        if: runner.os == 'Windows'
        id: python-path-windows
        shell: bash
        run: echo "path=$(uv python find ${{ matrix.python-version }})" >> "$GITHUB_OUTPUT"

      - name: Build wheel (Windows)
        if: runner.os == 'Windows'
        uses: messense/maturin-action@v1
        with:
          args: --release -m crates/unicode-intervals-py/Cargo.toml --out crates/unicode-intervals-py/dist --interpreter ${{ steps.python-path-windows.outputs.path }}

      - name: Build wheel (Unix)
        if: runner.os != 'Windows'
        uses: messense/maturin-action@v1
        with:
          args: --release -m crates/unicode-intervals-py/Cargo.toml --out crates/unicode-intervals-py/dist --interpreter ${{ matrix.python-version }}

      - name: Test wheel
        shell: bash
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install crates/unicode-intervals-py/dist/*.whl
          uv run --with pytest --with hypothesis pytest crates/unicode-intervals-py/tests-py
