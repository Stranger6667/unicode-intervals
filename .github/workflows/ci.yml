name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  RUSTFLAGS: -Dwarnings
  CARGO_TERM_COLOR: always

jobs:

  test:
    name: Tests (${{ matrix.toolchain }} / ${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - toolchain: nightly
            target: x86_64-unknown-linux-gnu
          - toolchain: beta
            target: x86_64-unknown-linux-gnu
          - toolchain: stable
            target: x86_64-unknown-linux-gnu
          - toolchain: "1.85.0"
            target: x86_64-unknown-linux-gnu
          - toolchain: stable
            target: wasm32-wasip1
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Wasmtime
        if: matrix.target == 'wasm32-wasip1'
        run: |
          cd /tmp
          wget https://github.com/bytecodealliance/wasmtime/releases/download/${{ env.VERSION }}/wasmtime-${{ env.VERSION }}-${{ env.ARCH }}.tar.xz
          tar xf wasmtime-${{ env.VERSION }}-${{ env.ARCH }}.tar.xz
          mv wasmtime-${{ env.VERSION }}-${{ env.ARCH }}/wasmtime /usr/local/bin/wasmtime
        env:
          VERSION: v28.0.0
          ARCH: x86_64-linux

      - run: cargo test --all --no-fail-fast --target=${{ matrix.target }}

  test-coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate code coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features

  fmt:
    name: Rustfmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
